<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-label="Architecture diagram">
  <rect width="1100" height="560" rx="24" fill="#08111f"/>
  <style>.t{font-family:Inter,ui-sans-serif,system-ui;fill:#e5edf7}.m{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;fill:#a7b4c7}.b{fill:#0f172a;stroke:#334155;stroke-width:2}.g{stroke:#38bdf8;stroke-width:4;fill:none;marker-end:url(#a)}</style>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/></marker></defs>
  <text x="50" y="70" class="t" font-size="36" font-weight="800">Safety flow</text>
  <rect x="70" y="130" width="210" height="110" rx="18" class="b"/><text x="105" y="180" class="t" font-size="22">MCP client</text><text x="105" y="212" class="m" font-size="15">OpenClaw, mcporter, etc.</text>
  <path d="M285 185 H405" class="g"/>
  <rect x="410" y="110" width="280" height="150" rx="18" fill="#111827" stroke="#60a5fa" stroke-width="2"/><text x="444" y="158" class="t" font-size="22">MCP wrapper</text><text x="444" y="190" class="m" font-size="15">validate cwd, model, flags</text><text x="444" y="218" class="m" font-size="15">default dryRun: true</text>
  <path d="M695 185 H815" class="g"/>
  <rect x="820" y="130" width="210" height="110" rx="18" class="b"/><text x="860" y="180" class="t" font-size="22">Local CLI</text><text x="860" y="212" class="m" font-size="15">spawn(command,args)</text>
  <rect x="150" y="330" width="800" height="120" rx="18" fill="#071827" stroke="#34d399" stroke-width="2"/>
  <text x="188" y="374" class="t" font-size="22">Guards</text>
  <text x="188" y="408" class="m" font-size="16">allowlisted real paths • no shell • timeout/output caps • write gate • best-effort redaction</text>
</svg>
